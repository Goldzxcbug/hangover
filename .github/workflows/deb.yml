        nproc

    - name: Build package
      run: cd wine; docker build -t wine${{ matrix.os }} .

    - name: Extract package
      run: docker run --rm wine${{ matrix.os }} cat /opt/artifacts/hangover-wine_${{ env.HOVERSION }}_${{ matrix.os }}_aarch64.tar.zst > hangover-wine_${{ env.HOVERSION }}_${{ matrix.os }}_aarch64.tar.zst

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: hangover-wine_${{ env.HOVERSION }}_${{ matrix.os }}_aarch64.tar.zst
        path: hangover-wine_${{ env.HOVERSION }}_${{ matrix.os }}_aarch64.tar.zst


  bundle:
    needs: [dxvk, fex-pe, fex-pe-ec, box-pe, wine, wine-arm]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [debian12, debian13, ubuntu2204, ubuntu2404, ubuntu2510, ubuntu2604]
        include:
          - os: debian12
            codename: bookworm
          - os: debian13
            codename: trixie
          - os: ubuntu2204
            codename: jammy
          - os: ubuntu2404
            codename: noble
          - os: ubuntu2510
            codename: questing
          - os: ubuntu2604
            codename: resolute

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: free disk space
      run: |
        sudo swapoff -a
        sudo rm -f /swapfile
        sudo apt clean
        df -h

    - name: get version
      run: |
        VERSION=$(git describe --tags 2>/dev/null || true)
        VERSION=${VERSION#hangover-}
        if [ -z "$VERSION" ]; then
          VERSION=0~git$(git rev-parse --short HEAD)
        fi
        echo "HOVERSION=$VERSION" >> "$GITHUB_ENV"
        echo "HOVERSION=$VERSION"

    - name: Download Artifacts 1/5
      uses: actions/download-artifact@v7
      with:
        pattern: hangover*${{ matrix.codename }}_arm64.deb
